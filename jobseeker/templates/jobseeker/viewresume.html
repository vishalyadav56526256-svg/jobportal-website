<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Resume | HireHub</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f7fc;
}

.container{
    width:90%;
    max-width:1100px;
    margin:40px auto;
}

.container h2{
    text-align:center;
    color:#1e3a8a;
    margin-bottom:30px;
}

.add-btn{
    display:inline-block;
    margin-bottom:20px;
    padding:12px 20px;
    background:#2563eb;
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    font-weight:600;
    transition:.3s;
}

.add-btn:hover{
    background:#1d4ed8;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

th{
    background:#2563eb;
    color:#fff;
    padding:15px;
    font-size:16px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f8fbff;
}

.download{
    background:#16a34a;
    color:white;
    text-decoration:none;
    padding:8px 15px;
    border-radius:6px;
    transition:.3s;
}

.download:hover{
    background:#15803d;
}

.edit{
    background:#f59e0b;
    color:white;
    text-decoration:none;
    padding:8px 15px;
    border-radius:6px;
    transition:.3s;
}

.edit:hover{
    background:#d97706;
}

.delete{
    background:#dc2626;
    color:white;
    text-decoration:none;
    padding:8px 15px;
    border-radius:6px;
    transition:.3s;
}

.delete:hover{
    background:#b91c1c;
}

.empty{
    text-align:center;
    padding:30px;
    color:#666;
    font-size:18px;
}

@media(max-width:768px){

table{
    font-size:14px;
}

th,td{
    padding:10px;
}

.add-btn{
    width:100%;
    text-align:center;
}

}
.back{
    margin-top:20px;
    text-align:center;
}

</style>

</head>
<body>

<div class="container">

<h2>My Resume</h2>

<a href="{% url 'uploadresume' %}" class="add-btn">
+ Upload New Resume
</a>

<table>

<tr>
    <th>ID</th>
    <th>Resume</th>
    <th>Uploaded Date</th>
    <th>Download</th>
    <th>Edit</th>
    <th>Delete</th>
</tr>

{% for resume in resumes %}

<tr>

<td>{{ resume.id }}</td>

<td>
{{ resume.resume_file.name }}
</td>

<td>
{{ resume.uploaded_at }}
</td>

<td>
<a href="{{ resume.resume_file.url }}" class="download" target="_blank">
Download
</a>
</td>

<td>
<a href="{% url 'editresume' resume.id %}" class="edit">
Edit
</a>
</td>

<td>
<a href="{% url 'deleteresume' resume.id %}"
class="delete"
onclick="return confirm('Are you sure you want to delete this resume?')">
Delete
</a>
</td>

</tr>

{% empty %}

<tr>
<td colspan="6" class="empty">
No Resume Uploaded Yet.
</td>
</tr>

{% endfor %}

</table>

</div>
<div class="back">
    <a href="{% url 'myprofile' %}">
        ← Back to Profile
    </a>


</div>

</body>
</html>

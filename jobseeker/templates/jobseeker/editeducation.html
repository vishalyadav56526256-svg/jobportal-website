<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Education | HireHub</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#2563eb,#1e3a8a);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:450px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.container h2{
    text-align:center;
    color:#1e3a8a;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:7px;
    font-weight:600;
    color:#333;
}

.form-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
    transition:.3s;
}

.form-group input:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 8px rgba(37,99,235,.3);
}

.btn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:#1d4ed8;
}

.back{
    text-align:center;
    margin-top:20px;
}

.back a{
    text-decoration:none;
    color:#2563eb;
    font-weight:600;
}

.back a:hover{
    text-decoration:underline;
}

@media(max-width:500px){

.container{
    width:90%;
    padding:25px;
}

}

</style>

</head>
<body>

<div class="container">

    <h2>Edit Education</h2>

    <form method="post">

        {% csrf_token %}

        <div class="form-group">
            <label>Course</label>
            <input
                type="text"
                name="course"
                value="{{ education.course }}"
                required>
        </div>

        <div class="form-group">
            <label>College Name</label>
            <input
                type="text"
                name="college"
                value="{{ education.college }}"
                required>
        </div>

        <div class="form-group">
            <label>Passing Year</label>
            <input
                type="number"
                name="passing_year"
                value="{{ education.passing_year }}"
                required>
        </div>

        <div class="form-group">
            <label>Percentage / CGPA</label>
            <input
                type="text"
                name="percentage"
                value="{{ education.percentage }}"
                required>
        </div>

        <button type="submit" class="btn">
            Update Education
        </button>

    </form>

    <div class="back">
        <a href="{% url 'vieweducation' %}">
            ← Back to Education List
        </a>
    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Resume | HireHub</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#2563eb,#1e3a8a);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:420px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.container h2{
    text-align:center;
    color:#1e3a8a;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#333;
}

.form-group input[type=file]{
    width:100%;
    padding:12px;
    border:2px dashed #2563eb;
    border-radius:8px;
    background:#f8faff;
    cursor:pointer;
}

.btn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:#fff;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:#1d4ed8;
}

.back{
    display:block;
    text-align:center;
    margin-top:15px;
    color:#2563eb;
    text-decoration:none;
    font-weight:600;
}

.back:hover{
    text-decoration:underline;
}

.message{
    background:#dcfce7;
    color:#15803d;
    padding:10px;
    border-radius:6px;
    margin-bottom:15px;
    text-align:center;
}

@media(max-width:500px){

.container{
    width:90%;
}

}

</style>

</head>

<body>

<div class="container">

<h2>Upload Resume</h2>

{% if messages %}
    {% for message in messages %}
        <div class="message">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="POST" enctype="multipart/form-data">

    {% csrf_token %}

    <div class="form-group">

        <label>Select Resume (PDF / DOC / DOCX)</label>

        <input
            type="file"
            name="resume"
            accept=".pdf,.doc,.docx"
            required>

    </div>

    <button type="submit" class="btn">
        Upload Resume
    </button>

</form>

<a href="{% url 'viewresume' %}" class="back">
    View Uploaded Resumes
</a>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Resume | HireHub</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#2563eb,#1e3a8a);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:450px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.container h2{
    text-align:center;
    color:#1e3a8a;
    margin-bottom:25px;
}

.current-file{
    background:#f5f5f5;
    padding:12px;
    border-radius:8px;
    margin-bottom:20px;
    font-size:15px;
}

.current-file a{
    color:#2563eb;
    text-decoration:none;
    font-weight:bold;
}

.current-file a:hover{
    text-decoration:underline;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#333;
}

.form-group input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:#1d4ed8;
}

.back{
    text-align:center;
    margin-top:18px;
}

.back a{
    text-decoration:none;
    color:#2563eb;
    font-weight:600;
}

.back a:hover{
    text-decoration:underline;
}

@media(max-width:500px){

.container{
    width:90%;
}

}

</style>

</head>
<body>

<div class="container">

    <h2>Update Resume</h2>

    <div class="current-file">
        <strong>Current Resume:</strong><br><br>

        <a href="{{ resume.resume.url }}" target="_blank">
            {{ resume.resume.name }}
        </a>
    </div>

    <form method="post" enctype="multipart/form-data">

        {% csrf_token %}

        <div class="form-group">

            <label>Select New Resume (PDF)</label>

            <input
                type="file"
                name="resume"
                accept=".pdf,.doc,.docx"
                required>

        </div>

        <button class="btn">
            Update Resume
        </button>

    </form>

    <div class="back">
        <a href="{% url 'viewresume' %}">
            ← Back to Resume List
        </a>
    </div>

</div>

</body>
</html>

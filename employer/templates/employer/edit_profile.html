<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Company Profile | HireHub</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#eef4ff,#dbeafe,#f8fbff);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:650px;
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.header{
    background:linear-gradient(135deg,#2563eb,#1e3a8a);
    color:white;
    text-align:center;
    padding:30px;
}

.header h2{
    font-size:30px;
    margin-bottom:8px;
}

.header p{
    opacity:.9;
}

.form{
    padding:35px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    font-weight:600;
    margin-bottom:8px;
    color:#1e3a8a;
}

.form-group input,
.form-group textarea,
.form-group select{
    width:100%;
    padding:13px;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:15px;
    transition:.3s;
}

.form-group textarea{
    resize:none;
    height:90px;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 10px rgba(37,99,235,.25);
}

.buttons{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.btn{
    text-decoration:none;
    padding:13px 25px;
    border:none;
    border-radius:30px;
    font-size:15px;
    cursor:pointer;
    color:white;
    font-weight:600;
    transition:.3s;
}

.save{
    background:#2563eb;
}

.save:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

.cancel{
    background:#6b7280;
}

.cancel:hover{
    background:#4b5563;
    transform:translateY(-2px);
}

.message{
    background:#dcfce7;
    color:#166534;
    padding:12px;
    border-radius:8px;
    margin-bottom:20px;
    text-align:center;
    font-weight:600;
}

@media(max-width:700px){

.container{
    width:100%;
}

.form{
    padding:25px;
}

.buttons{
    flex-direction:column;
}

.btn{
    width:100%;
}

}

</style>

</head>
<body>

<div class="container">

<div class="header">
<h2>Edit Company Profile</h2>
<p>Update your company information</p>
</div>

<div class="form">
<!-- 
{% if messages %}
    {% for message in messages %}
        <div class="message">
            {{ message }}
        </div>
    {% endfor %}
{% endif %} -->

<form method="post">

{% csrf_token %}

<div class="form-group">
<label>Company Name</label>
<input
type="text"
name="company_name"
value="{{ employer.company_name }}"
required>
</div>

<div class="form-group">
<label>Owner Name</label>
<input
type="text"
name="ower_name"
value="{{ employer.ower_name }}"
required>
</div>

<div class="form-group">
<label>Email</label>
<input
type="email"
name="email"
value="{{ employer.email }}"
required>
</div>

<div class="form-group">
<label>Mobile Number</label>
<input
type="text"
name="mobile_number"
value="{{ employer.mobile_number }}"
required>
</div>

<div class="form-group">
<label>Address</label>
<textarea
name="address"
required>{{ employer.address }}</textarea>
</div>

<div class="form-group">
<label>Company Type</label>

<select name="company_type" required>

<option {% if employer.company_type == "IT Company" %}selected{% endif %}>IT Company</option>

<option {% if employer.company_type == "Software Company" %}selected{% endif %}>Software Company</option>

<option {% if employer.company_type == "Finance" %}selected{% endif %}>Finance</option>

<option {% if employer.company_type == "Marketing" %}selected{% endif %}>Marketing</option>

<option {% if employer.company_type == "Manufacturing" %}selected{% endif %}>Manufacturing</option>

<option {% if employer.company_type == "Education" %}selected{% endif %}>Education</option>

<option {% if employer.company_type == "Healthcare" %}selected{% endif %}>Healthcare</option>

<option {% if employer.company_type == "Startup" %}selected{% endif %}>Startup</option>

<option {% if employer.company_type == "Other" %}selected{% endif %}>Other</option>

</select>

</div>

<div class="buttons">

<button type="submit" class="btn save">
💾 Save Changes
</button>

<a href="{% url 'profile' %}" class="btn cancel">
← Cancel
</a>

</div>

</form>

</div>

</div>

</body>
</html>

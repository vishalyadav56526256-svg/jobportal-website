<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employer Registration | HireHub</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#2563eb,#1e3a8a);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:500px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.container h2{
    text-align:center;
    color:#1e3a8a;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:7px;
    font-weight:600;
    color:#333;
}

.form-group input,
.form-group textarea,
.form-group select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
    transition:.3s;
}

.form-group textarea{
    resize:none;
    height:90px;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 8px rgba(37,99,235,.3);
}

.btn{
    width:100%;
    padding:13px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:#1d4ed8;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    color:#2563eb;
    text-decoration:none;
    font-weight:600;
}

.login-link a:hover{
    text-decoration:underline;
}

.message{
    background:#fee2e2;
    color:#b91c1c;
    padding:10px;
    border-radius:8px;
    margin-bottom:20px;
    text-align:center;
}

@media(max-width:550px){

.container{
    width:100%;
    padding:25px;
}

}

</style>
</head>

<body>

<div class="container">

<h2>Employer Registration</h2>

{% if messages %}
    {% for message in messages %}
        <div class="message">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="post">

{% csrf_token %}

<div class="form-group">
<label>Company Name</label>
<input
type="text"
name="company_name"
placeholder="ABC Technologies Pvt Ltd"
required>
</div>

<div class="form-group">
<label>Owner Name</label>
<input
type="text"
name="ower_name"
placeholder="Enter Owner Name"
required>
</div>

<div class="form-group">
<label>Email</label>
<input
type="email"
name="email"
placeholder="company@gmail.com"
required>
</div>

<div class="form-group">
<label>Mobile Number</label>
<input
type="text"
name="mobile_number"
placeholder="9876543210"
required>
</div>

<div class="form-group">
<label>Address</label>
<textarea
name="address"
placeholder="Company Address"
required></textarea>
</div>

<div class="form-group">
<label>Company Type</label>

<select name="company_type" required>

<option value="">Select Company Type</option>

<option>IT Company</option>

<option>Software Company</option>

<option>Finance</option>

<option>Marketing</option>

<option>Manufacturing</option>

<option>Education</option>

<option>Healthcare</option>

<option>Startup</option>

<option>Other</option>

</select>

</div>

<div class="form-group">
<label>Password</label>
<input
type="password"
name="password"
placeholder="********"
required>
</div>

<div class="form-group">
<label>Confirm Password</label>
<input
type="password"
name="confirm_password"
placeholder="********"
required>
</div>

<button class="btn">
Register Company
</button>

</form>

<div class="login-link">

Already Registered?

<a href="{% url 'employer_login' %}">
Login Here
</a>

</div>

</div>

</body>
</html>

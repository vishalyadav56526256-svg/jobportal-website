<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employer Login | HireHub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1d4ed8,#3b82f6);
overflow:hidden;
position:relative;
}

/* Animated Background */

body::before,
body::after{
content:"";
position:absolute;
border-radius:50%;
filter:blur(100px);
animation:move 8s infinite alternate;
}

body::before{
width:350px;
height:350px;
background:#38bdf8;
top:-100px;
left:-100px;
}

body::after{
width:300px;
height:300px;
background:#7c3aed;
bottom:-80px;
right:-80px;
}

@keyframes move{
100%{
transform:translate(80px,40px);
}
}

.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,.08);
animation:float 6s infinite ease-in-out;
}

.c1{
width:140px;
height:140px;
top:10%;
left:15%;
}

.c2{
width:80px;
height:80px;
bottom:18%;
left:8%;
}

.c3{
width:160px;
height:160px;
top:18%;
right:10%;
}

.c4{
width:100px;
height:100px;
bottom:10%;
right:18%;
}

@keyframes float{
50%{
transform:translateY(-25px);
}
}

.wrapper{
width:100%;
max-width:1100px;
display:flex;
justify-content:space-between;
align-items:center;
padding:40px;
gap:70px;
position:relative;
z-index:2;
}

.left{
width:45%;
color:white;
}

.left h1{
font-size:60px;
margin-bottom:15px;
}

.left h3{
font-size:30px;
margin-bottom:20px;
}

.left p{
font-size:18px;
line-height:30px;
opacity:.9;
}

.container{
width:420px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(20px);
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.35);
border:1px solid rgba(255,255,255,.2);
}

.container h2{
text-align:center;
color:white;
margin-bottom:30px;
font-size:30px;
}

.form-group{
margin-bottom:20px;
}

.form-group label{
display:block;
margin-bottom:8px;
font-weight:600;
color:white;
}

.form-group input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:rgba(255,255,255,.95);
font-size:15px;
transition:.3s;
}

.form-group input:focus{
outline:none;
box-shadow:0 0 15px #60a5fa;
transform:scale(1.02);
}

.btn{
width:100%;
padding:15px;
background:#2563eb;
color:white;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
transition:.3s;
font-weight:bold;
}

.btn:hover{
background:#1d4ed8;
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(37,99,235,.4);
}

.links{
margin-top:20px;
text-align:center;
color:white;
}

.links a{
color:#facc15;
text-decoration:none;
font-weight:bold;
}

.links a:hover{
text-decoration:underline;
}

.message{
background:#dc2626;
padding:12px;
border-radius:8px;
margin-bottom:20px;
color:white;
text-align:center;
}

@media(max-width:900px){

.wrapper{
flex-direction:column;
}

.left{
display:none;
}

.container{
width:100%;
max-width:420px;
}

}

</style>

</head>
<body>

<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>
<div class="circle c4"></div>

<div class="wrapper">

<div class="left">

<h1>HireHub</h1>

<h3>Employer Portal</h3>

<p>
Hire the best talent, post jobs, manage applicants and grow your company with HireHub. Your recruitment journey starts here.
</p>

</div>

<div class="container">

<h2>Employer Login</h2>

<!-- {% if messages %}
{% for message in messages %}
<div class="message">
{{ message }}
</div>
{% endfor %}
{% endif %} -->

<form method="post">

{% csrf_token %}

<div class="form-group">
<label>Email Address</label>
<input type="email" name="email" placeholder="Enter Email" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" placeholder="Enter Password" required>
</div>

<button type="submit" class="btn">
Login
</button>

</form>

<div class="links">

<p>
Don't have an account?
<a href="{% url 'employer_register' %}">
Register Here
</a>
</p>

</div>

</div>

</div>

</body>
</html>

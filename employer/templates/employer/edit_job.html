<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Job | HireHub</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#eef4ff,#dbeafe,#f8fbff);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.container{
    width:100%;
    max-width:800px;
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
}

.header{
    background:linear-gradient(135deg,#2563eb,#1e3a8a);
    color:#fff;
    text-align:center;
    padding:35px;
}

.header h2{
    font-size:32px;
    margin-bottom:8px;
}

.header p{
    opacity:.9;
}

.form-box{
    padding:35px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#1e3a8a;
}

.form-group input,
.form-group textarea,
.form-group select{

    width:100%;
    padding:13px;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:15px;
    transition:.3s;

}

.form-group textarea{
    resize:none;
    height:120px;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus{

    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 10px rgba(37,99,235,.25);

}

.readonly{
    background:#f3f4f6;
    cursor:not-allowed;
}

.buttons{

    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;

}

.btn{

    padding:13px 28px;
    border:none;
    border-radius:30px;
    text-decoration:none;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;

}

.update{
    background:#2563eb;
    color:#fff;
}

.update:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

.cancel{
    background:#6b7280;
    color:white;
}

.cancel:hover{
    background:#4b5563;
    transform:translateY(-2px);
}

@media(max-width:768px){

.container{
    width:100%;
}

.form-box{
    padding:25px;
}

.buttons{
    flex-direction:column;
}

.btn{
    width:100%;
    text-align:center;
}

}

</style>

</head>
<body>

<div class="container">

<div class="header">

<h2>Edit Job</h2>

<p>Update your posted job details</p>

</div>

<div class="form-box">

<form method="POST">

{% csrf_token %}

<div class="form-group">

<label>Job Title</label>

<input
type="text"
name="job_title"
value="{{ job.job_title }}"
required>

</div>

<div class="form-group">

<label>Company Name</label>

<input
type="text"
name="company_name"
value="{{ employer.company_name }}"
class="readonly"
readonly>

</div>

<div class="form-group">

<label>Location</label>

<input
type="text"
name="location"
value="{{ job.location }}"
required>

</div>

<div class="form-group">

<label>Salary</label>

<input
type="text"
name="salary"
value="{{ job.salary }}"
required>

</div>

<div class="form-group">

<label>Experience</label>

<input
type="text"
name="experience"
value="{{ job.experience }}"
required>

</div>

<div class="form-group">

<label>Vacancies</label>

<input
type="number"
name="vacancies"
value="{{ job.vacancies }}"
required>

</div>

<div class="form-group">

<label>Job Type</label>

<select name="job_type" required>

<option value="Full Time" {% if job.job_type == "Full Time" %}selected{% endif %}>Full Time</option>

<option value="Part Time" {% if job.job_type == "Part Time" %}selected{% endif %}>Part Time</option>

<option value="Internship" {% if job.job_type == "Internship" %}selected{% endif %}>Internship</option>

<option value="Remote" {% if job.job_type == "Remote" %}selected{% endif %}>Remote</option>

</select>

</div>

<div class="form-group">

<label>Required Skills</label>

<textarea
name="skills"
required>{{ job.skills }}</textarea>

</div>

<div class="form-group">

<label>Job Description</label>

<textarea
name="description"
required>{{ job.description }}</textarea>

</div>

<div class="buttons">

<button type="submit" class="btn update">
💾 Update Job
</button>

<a href="{% url 'my_jobs' %}" class="btn cancel">
← Cancel
</a>

</div>

</form>

</div>

</div>

</body>
</html>
